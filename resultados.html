<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Retorno a Kiel</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/config.js"></script>
    <script src="js/scripts.js" defer></script>
</head>
<body>
    <main>
        <h2>Cargar Cuaderno de Bitácora (Resultados)</h2>
        <p>Sube el archivo de resultados de la partida para procesar el tonelaje.</p>
        
        <div class="upload-container">
            <input type="file" id="file-resultados" accept=".txt,.json">
            <button id="btn-procesar-archivo">Cargar y Computar Tonelaje</button>
        </div>

        <div id="previsualizacion-resultados"></div>
    </main>
</body>
</html>
