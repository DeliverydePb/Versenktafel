<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Patrullas - Sala de Mapas</title>
    <script>
        // Guardián de seguridad del lado del cliente
        if (localStorage.getItem("sesionActiva") !== "true") {
            window.location.href = "index.html";
        }
    </script>
</head>
<body>
    <h1>Bienvenido a la Sala de Patrullas</h1>
    <p>Comandante al mando: <strong id="rangoComandante"></strong></p>
    
    <button onclick="cerrarSesion()">Cerrar Sesión</button>

    <script>
        // Cargar el nombre guardado en la sesión
        document.getElementById("rangoComandante").innerText = localStorage.getItem("nombreComandante");

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
