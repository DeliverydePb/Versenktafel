<!DOCTYPE html>
<!--
  register.html — Página de Registro de nuevo Comandante
  
  Permite a un nuevo usuario crear su cuenta.
  Datos requeridos: Nombre del Comandante, E-mail, Contraseña.
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Hunters League — Nuevo Comandante</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Estilos adicionales específicos de esta página -->
  <style>
    /* Indicador de fortaleza de contraseña */
    .medidor-fuerza {
      margin-top: 0.5rem;
      height: 4px;
      background-color: var(--color-borde);
      border-radius: 2px;
      overflow: hidden;
    }
    .medidor-fuerza-barra {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background-color 0.3s;
    }
    .fuerza-debil   { width: 33%; background-color: var(--color-rojo); }
    .fuerza-media   { width: 66%; background-color: var(--color-ambar); }
    .fuerza-fuerte  { width: 100%; background-color: var(--color-verde); }
    
    .texto-fuerza {
      font-size: 0.7rem;
      margin-top: 0.3rem;
      color: var(--color-verde-dim);
    }
  </style>
</head>
<body>

  <!-- ── Encabezado ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="logo-badge" role="img" aria-label="Logo">⚓</div>
    <h1 class="site-title">Silent Hunters</h1>
    <p class="site-subtitle">Kriegsmarine Operations League</p>
  </header>

  <!-- ── Panel de registro ─────────────────────────────────── -->
  <main>
    <div class="panel">
      
      <h2 class="panel-titulo">Nuevo Comandante</h2>
      <hr class="panel-separador">
      
      <!-- Alerta de mensajes -->
      <div id="alerta" class="alerta" role="alert" aria-live="polite"></div>
      
      <form id="form-registro" onsubmit="return false" novalidate>
        
        <!-- Campo: Nombre del Comandante -->
        <div class="form-grupo">
          <label for="comandante">🎖️ Nombre del Comandante</label>
          <input
            type="text"
            id="comandante"
            name="comandante"
            placeholder="Ej: Kapitän Werner"
            autocomplete="name"
            maxlength="50"
            required
          >
          <!-- maxlength="50": no permite más de 50 caracteres -->
          <span id="comandante-error" class="campo-error" role="alert"></span>
        </div>
        
        <!-- Campo: E-mail -->
        <div class="form-grupo">
          <label for="email">📡 Dirección de Transmisión (E-mail)</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="comandante@flota.com"
            autocomplete="email"
            required
          >
          <span id="email-error" class="campo-error" role="alert"></span>
        </div>
        
        <!-- Campo: Contraseña -->
        <div class="form-grupo">
          <label for="contrasena">🔐 Código de Acceso (Contraseña)</label>
          <input
            type="password"
            id="contrasena"
            name="contrasena"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
            required
          >
          <!-- Barra indicadora de fortaleza de la contraseña -->
          <div class="medidor-fuerza">
            <div class="medidor-fuerza-barra" id="barra-fuerza"></div>
          </div>
          <div class="texto-fuerza" id="texto-fuerza"></div>
          <span id="contrasena-error" class="campo-error" role="alert"></span>
        </div>
        
        <!-- Campo: Confirmar Contraseña -->
        <div class="form-grupo">
          <label for="confirmar">🔐 Confirmar Código de Acceso</label>
          <input
            type="password"
            id="confirmar"
            name="confirmar"
            placeholder="Repetí la contraseña"
            autocomplete="new-password"
            required
          >
          <span id="confirmar-error" class="campo-error" role="alert"></span>
        </div>
        
        <!-- Botón de envío -->
        <button type="submit" class="btn-primario" id="btn-registro">
          ▶ Registrar Comandante
        </button>
        
      </form>
      
      <!-- Navegación -->
      <nav class="nav-links">
        <a href="index.html">← Ya tengo cuenta. Acceder</a>
      </nav>
      
      <div class="profundidad" aria-hidden="true">SECTOR: ATLÁNTICO NORTE — ESTADO: ACTIVO</div>
      
    </div>
  </main>
  
  <footer class="site-footer">
    SILENT HUNTERS LEAGUE · EST. 2024 · OPERACIONES SUBSUPERFICIALES
  </footer>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      // Referencias a los elementos del formulario
      const form          = document.getElementById('form-registro');
      const btnRegistro   = document.getElementById('btn-registro');
      const inputNombre   = document.getElementById('comandante');
      const inputEmail    = document.getElementById('email');
      const inputClave    = document.getElementById('contrasena');
      const inputConfirmar = document.getElementById('confirmar');
      const barraFuerza   = document.getElementById('barra-fuerza');
      const textoFuerza   = document.getElementById('texto-fuerza');
      
      
      /* ── Indicador de fortaleza de contraseña ────────────────
         Mientras el usuario escribe su contraseña, evaluamos
         qué tan segura es y actualizamos la barra de color.
         ─────────────────────────────────────────────────────── */
      inputClave.addEventListener('input', function() {
        const clave = this.value;
        
        // Limpiamos clases anteriores de la barra
        barraFuerza.className = 'medidor-fuerza-barra';
        
        if (clave.length === 0) {
          textoFuerza.textContent = '';
          return;
        }
        
        // Calculamos la fortaleza basándonos en criterios simples
        let puntos = 0;
        if (clave.length >= 6)  puntos++;   // Longitud mínima
        if (clave.length >= 10) puntos++;   // Longitud buena
        if (/[0-9]/.test(clave)) puntos++;  // Tiene números
        if (/[^a-zA-Z0-9]/.test(clave)) puntos++; // Tiene símbolos
        
        // Aplicamos la clase correspondiente según los puntos
        if (puntos <= 1) {
          barraFuerza.classList.add('fuerza-debil');
          textoFuerza.textContent = '⚠ Clave débil';
          textoFuerza.style.color = 'var(--color-rojo)';
        } else if (puntos <= 2) {
          barraFuerza.classList.add('fuerza-media');
          textoFuerza.textContent = '◎ Clave aceptable';
          textoFuerza.style.color = 'var(--color-ambar)';
        } else {
          barraFuerza.classList.add('fuerza-fuerte');
          textoFuerza.textContent = '✓ Clave segura';
          textoFuerza.style.color = 'var(--color-verde)';
        }
      });
      
      
      /* ── Manejo del envío del formulario ─────────────────── */
      form.addEventListener('submit', async function() {
        
        // Limpiar errores anteriores
        ocultarAlerta('alerta');
        limpiarErroresCampos();
        
        // Leer valores
        const nombre    = inputNombre.value.trim();
        const email     = inputEmail.value.trim();
        const clave     = inputClave.value;
        const confirmar = inputConfirmar.value;
        
        // ── Validaciones ─────────────────────────────────────
        let hayErrores = false;
        
        // Validar nombre del comandante
        if (!nombre) {
          mostrarErrorCampo('comandante', 'comandante-error', 'Ingresá tu nombre de comandante.');
          hayErrores = true;
        } else if (nombre.length < 3) {
          mostrarErrorCampo('comandante', 'comandante-error', 'El nombre debe tener al menos 3 caracteres.');
          hayErrores = true;
        }
        
        // Validar email
        if (!email) {
          mostrarErrorCampo('email', 'email-error', 'Ingresá tu dirección de e-mail.');
          hayErrores = true;
        } else if (!validarEmail(email)) {
          mostrarErrorCampo('email', 'email-error', 'El formato del e-mail no es válido.');
          hayErrores = true;
        }
        
        // Validar contraseña
        const validacionClave = validarContrasena(clave);
        if (!validacionClave.valida) {
          mostrarErrorCampo('contrasena', 'contrasena-error', validacionClave.mensaje);
          hayErrores = true;
        }
        
        // Validar que las contraseñas coincidan
        if (clave !== confirmar) {
          mostrarErrorCampo('confirmar', 'confirmar-error', 'Los códigos de acceso no coinciden.');
          hayErrores = true;
        }
        
        if (hayErrores) return;
        
        // ── Deshabilitar botón mientras procesa ──────────────
        btnRegistro.disabled = true;
        btnRegistro.textContent = '▶ Procesando';
        
        // ── Hashear la contraseña ────────────────────────────
        const claveHash = await hashearContrasena(clave);
        
        // ── Enviar al servidor ───────────────────────────────
        const resultado = await pedirAlServidor('registro', {
          comandante: nombre,
          email:      email,
          claveHash:  claveHash,
        });
        
        // ── Procesar respuesta ───────────────────────────────
        if (resultado.exito) {
          
          // Registro exitoso: guardamos sesión y redirigimos
          guardarSesion({
            comandante: resultado.comandante,
            email:      resultado.email,
          });
          
          mostrarAlerta('alerta', '✓ ¡Bienvenido a la flota, Comandante! Redirigiendo...', 'exito');
          
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
          
        } else {
          
          mostrarAlerta('alerta', resultado.mensaje || 'Error al registrar. Intentá de nuevo.', 'error');
          
          btnRegistro.disabled = false;
          btnRegistro.textContent = '▶ Registrar Comandante';
        }
      });
      
      
      /* ── Funciones auxiliares locales ─────────────────────── */
      
      function mostrarErrorCampo(idCampo, idError, mensaje) {
        const campo = document.getElementById(idCampo);
        const error = document.getElementById(idError);
        if (campo) campo.classList.add('invalido');
        if (error) { error.textContent = mensaje; error.style.display = 'block'; }
      }
      
      function limpiarErroresCampos() {
        document.querySelectorAll('input.invalido').forEach(i => i.classList.remove('invalido'));
        document.querySelectorAll('.campo-error').forEach(e => {
          e.style.display = 'none';
          e.textContent = '';
        });
      }
      
      // Limpiar error al escribir
      [inputNombre, inputEmail, inputClave, inputConfirmar].forEach(input => {
        input.addEventListener('input', function() {
          this.classList.remove('invalido');
          const errorSpan = this.parentElement.querySelector('.campo-error');
          if (errorSpan) errorSpan.style.display = 'none';
        });
      });
      
    }); // Fin DOMContentLoaded
  </script>
  
</body>
</html>
