<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24 Flotilla - Login y Registro</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .hidden {
            display: none;
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .tonelaje-section {
            margin-top: 20px;
            text-align: left;
        }

        .table-controls {
            margin-bottom: 10px;
        }

        .table-controls button {
            margin-right: 6px;
            padding: 6px 10px;
            border: 1px solid #007bff;
            background: #fff;
            color: #007bff;
            border-radius: 4px;
            cursor: pointer;
        }

        .table-controls button:hover {
            background: #007bff;
            color: #fff;
        }

        .table-wrapper {
            overflow-x: hidden;
        }

        #tonelaje-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 14px;
        }

        #tonelaje-table th,
        #tonelaje-table td {
            border: 1px solid #ddd;
            padding: 4px 3px;
            text-align: center;
        }

        #tonelaje-table th {
            background: #f0f0f5;
            font-weight: bold;
        }

        #tonelaje-table th.sortable {
            cursor: pointer;
            user-select: none;
        }

        #tonelaje-table th.sortable:hover {
            background: #e0e0e5;
        }

        .sort-icon {
            margin-left: 5px;
            font-size: 12px;
            opacity: 0.6;
        }

        .sort-icon.active {
            opacity: 1;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Registro de Tonelaje</h2>
        <p id="status-message">Inicia sesión con tu cuenta de Google para comenzar.</p>

        <div id="google-login-container">
            <div id="buttonDiv"></div>
        </div>

        <button type="button"
            onclick="window.open('missionmap.html', '_blank', 'width=1200,height=800,noopener,noreferrer');">
            Abrir mapa de misiones
        </button>

        <div id="register-form" class="hidden">
            <h3>¡Bienvenido/a!</h3>
            <p>No encontramos tu correo registrado. Por favor, elige tu nombre de capitán.</p>
            <input type="text" id="game-name" placeholder="Nombre en el Juego (ej. Capt_Miller)" required>
            <button id="btn-register">Completar Registro</button>
        </div>

        <div id="tonelaje-section" class="tonelaje-section">
            <h3>Tabla de Tonelaje</h3>

            <div class="table-wrapper">
                <table id="tonelaje-table">
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="Comandante">Comandante <span class="sort-icon">▼</span></th>
                            <th class="sortable" data-sort="Toneladas">Toneladas <span class="sort-icon">▼</span></th>
                            <th class="sortable" data-sort="Patrullas">Patrullas <span class="sort-icon">▼</span></th>
                            <th class="sortable" data-sort="TonPatrulla">Ton/Patrulla <span class="sort-icon">▼</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4">Cargando datos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="index_scripts.js"></script>
</body>

</html>
