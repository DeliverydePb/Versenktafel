<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Comandantes - Login</title>
    <style>
        body { font-family: monospace; background-color: #1a1a1a; color: #00ff00; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #00ff00; padding: 30px; background-color: #111; box-shadow: 0 0 15px rgba(0,255,0,0.3); width: 300px; }
        h2 { text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; background-color: #222; border: 1px solid #00ff00; color: #00ff00; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 10px; background-color: #00ff00; color: #111; border: none; font-weight: bold; cursor: pointer; font-family: monospace; }
        button:hover { background-color: #00cc00; }
        #mensaje { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Acceso a la Red</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="comandante">Comandante:</label>
            <input type="text" id="comandante" required autocomplete="username">
        </div>
        <div class="input-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit">Autenticar</button>
    </form>
    <div id="mensaje"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
