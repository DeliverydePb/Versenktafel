<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Kriegsmarine Command - BdU</title>
    <script src="config.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0d0d; color: #adb5bd; padding: 20px; line-height: 1.4; }
        h1, h2 { color: #00ff00; border-bottom: 1px solid #00ff00; padding-bottom: 10px; text-shadow: 0 0 5px #00ff00; }
        .panel { border: 1px solid #495057; padding: 15px; margin-bottom: 15px; background: #1a1d20; box-shadow: inset 0 0 10px #000; }
        .btn { background: #1a1d20; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; margin: 5px 0; }
        .btn:hover { background: #00ff00; color: #000; }
        .btn-cancelar { color: #ff3333; border-color: #ff3333; }
        .btn-cancelar:hover { background: #ff3333; color: #fff; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th { background: #2b2f33; color: #00ff00; }
        th, td { padding: 12px; border: 1px solid #495057; text-align: left; }
        .oculto { display: none; }
        .alerta { color: #ff3333; font-weight: bold; margin: 10px 0; border-left: 4px solid #ff3333; padding-left: 10px; }
        select { background: #1a1d20; color: #00ff00; border: 1px solid #00ff00; padding: 5px; font-family: inherit; }
    </style>
</head>
<body>

    <h1>⚓ CUARTEL GENERAL DE SUBMARINOS (BdU) ⚓</h1>

    <div id="login-area" class="panel">
        <h2>IDENTIFICACIÓN DE COMANDANTE</h2>
        <div id="boton-google"></div>
        <p id="user-info"></p>
    </div>

    <div class="panel">
        <h2>📊 REGISTRO DE TONELAJE</h2>
        <table id="tabla-ranking">
            <thead><tr><th>CAPITÁN</th><th>TONELAJE TOTAL</th></tr></thead>
            <tbody><tr><td colspan="2">Conectando...</td></tr></tbody>
        </table>
    </div>

    <div id="misiones-area" class="panel oculto">
        <h2>🗺️ PIZARRA DE MISIONES ACTIVAS</h2>
        <div id="estado-usuario" class="alerta"></div>
        <div id="lista-misiones"></div>

        <div id="control-mision-propia" style="margin-top:20px;">
            <div id="setup-mision">
                <label>Selecciona tu submarino para la patrulla:</label><br>
                <select id="sub-creador">
                    <option value="U-96">U-96</option>
                    <option value="U-552">U-552</option>
                    <option value="U-564">U-564</option>
                    <option value="U-307">U-307</option>
                </select><br><br>
                <button id="btn-crear" class="btn" onclick="crearMision()">🚀 Iniciar Nueva Patrulla</button>
            </div>
            
            <div id="area-gestion-activa" class="oculto">
                <button class="btn btn-cancelar" onclick="cancelarMision()">❌ Cancelar Patrulla</button>
                <div class="panel" style="border-color: #00ff00; margin-top: 20px;">
                    <h3>📥 REPORTAR RESULTADOS</h3>
                    <input type="file" id="foto-ocr" accept="image/*">
                    <button class="btn" onclick="alert('OCR en desarrollo')">ENVIAR REPORTE</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let usuarioActual = null;
        let misionesActivas = [];

        function inicializarGoogle() {
            google.accounts.id.initialize({ client_id: CONFIG.CLIENT_ID, callback: onSignIn });
            google.accounts.id.renderButton(document.getElementById("boton-google"), { theme: "outline", size: "large" });
        }

        async function refrescarDatos() {
            try {
                const r = await fetch(CONFIG.URL_API);
                const data = await r.json();
                document.querySelector("#tabla-ranking tbody").innerHTML = data.ranking.map(u => `<tr><td>${u.n}</td><td>${u.p.toLocaleString()} TN</td></tr>`).join('') || "<tr><td colspan='2'>Sin registros.</td></tr>";
                misionesActivas = data.misiones;
                actualizarInterfazMisiones();
            } catch (e) { console.error(e); }
        }

        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            usuarioActual = payload;
            document.getElementById('user-info').innerText = "Comandante: " + payload.name;
            document.getElementById('misiones-area').classList.remove('oculto');
            document.getElementById('login-area').style.display = "none";
            fetch(CONFIG.URL_API, { method: 'POST', body: JSON.stringify({action:"login", email:payload.email, nombre:payload.name}) });
            refrescarDatos();
        }

        function actualizarInterfazMisiones() {
            if (!usuarioActual) return;
            const lista = document.getElementById('lista-misiones');
            const miMision = misionesActivas.find(m => m.creadorEmail === usuarioActual.email);
            
            if (miMision) {
                document.getElementById('setup-mision').classList.add('oculto');
                document.getElementById('area-gestion-activa').classList.remove('oculto');
                document.getElementById('estado-usuario').innerText = "⚠️ TIENES UNA PATRULLA ACTIVA.";
                lista.innerHTML = "";
            } else {
                document.getElementById('setup-mision').classList.remove('oculto');
                document.getElementById('area-gestion-activa').classList.add('oculto');
                document.getElementById('estado-usuario').innerText = "PATRULLAS DISPONIBLES:";
                lista.innerHTML = misionesActivas.map(m => `
                    <div style="border:1px solid #444; padding:15px; margin:10px 0; background:#252a2e;">
                        <strong>Comandante:</strong> ${m.creadorNombre} <br><br>
                        <select id="sub-unirse-${m.id}">
                            <option value="U-96">U-96</option>
                            <option value="U-552">U-552</option>
                            <option value="U-564">U-564</option>
                            <option value="U-307">U-307</option>
                        </select>
                        <button class="btn" onclick="unirse('${m.id}')">⚓ UNIRSE</button>
                    </div>
                `).join('') || "<p>No hay patrullas activas.</p>";
            }
        }

        async function crearMision() {
            const sub = document.getElementById('sub-creador').value;
            const res = await fetch(CONFIG.URL_API, { method: 'POST', body: JSON.stringify({
                action: "crearMision", 
                email: usuarioActual.email, 
                nombreCreador: usuarioActual.name,
                submarino: sub
            })});
            
            if(res.ok) {
                descargarArchivoMision(sub);
                refrescarDatos();
            }
        }

        async function unirse(id) {
            const sub = document.getElementById(`sub-unirse-${id}`).value;
            await fetch(CONFIG.URL_API, { method: 'POST', body: JSON.stringify({action: "unirseMision", idMision: id, email: usuarioActual.email, submarino: sub })});
            refrescarDatos();
        }

        async function cancelarMision() {
            if(!confirm("¿Seguro que deseas cancelar la patrulla? Se borrará de la pizarra.")) return;
            await fetch(CONFIG.URL_API, { method: 'POST', body: JSON.stringify({action: "cancelarMision", email: usuarioActual.email })});
            refrescarDatos();
        }

        function descargarArchivoMision(submarino) {
            const texto = `ORDEN DE OPERACIONES - BdU\n--------------------------\nComandante: ${usuarioActual.name}\nSubmarino: ${submarino}\nFecha: ${new Date().toLocaleString()}\n\nBuena caza, Herr Kaleun.`;
            const blob = new Blob([texto], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mision_${submarino}.txt`;
            a.click();
        }

        window.onload = function() { inicializarGoogle(); refrescarDatos(); };
    </script>
</body>
</html>
