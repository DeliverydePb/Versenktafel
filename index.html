<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Comandantes - Login</title>
    <style>
        /* Configuración de la página en general */
        body { 
            font-family: monospace; 
            background-color: #1a1a1a; 
            color: #00ff00; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        /* Caja de Login */
        .login-box { 
            border: 2px solid #00ff00; 
            padding: 30px; 
            background-color: #111; 
            box-shadow: 0 0 15px rgba(0,255,0,0.3); 
            width: 300px; 
            margin-bottom: 40px; /* Espacio de separación con la tabla de abajo */
        }
        h2 { text-align: center; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; background-color: #222; border: 1px solid #00ff00; color: #00ff00; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 10px; background-color: #00ff00; color: #111; border: none; font-weight: bold; cursor: pointer; font-family: monospace; }
        button:hover { background-color: #00cc00; }
        #mensaje { margin-top: 15px; text-align: center; font-weight: bold; }

        /* Contenedor del Tablero de Puntuaciones */
        .leaderboard-container { 
            width: 100%; 
            max-width: 550px; 
            text-align: center; 
        }
        .leaderboard-container h3 { 
            letter-spacing: 2px; 
            margin-bottom: 15px; 
        }

        /* Estilos de la Tabla (Líneas y alineación) */
        table { 
            width: 100%; 
            border-collapse: collapse; /* Hace que las líneas se unan en una sola */
            border: 2px solid #00ff00; /* Línea exterior gruesa verde */
        }
        th { 
            background-color: #003300; /* Fondo verde oscuro para los títulos */
            color: #00ff00; 
            padding: 10px; 
            border: 1px solid #00ff00; /* Líneas divisorias de los títulos */
            text-align: center; /* Centra el texto de los títulos */
            text-transform: uppercase;
        }
        td { 
            padding: 10px; 
            border: 1px solid #004400; /* Líneas divisorias de los datos */
            text-align: center; /* Centra el texto de los datos de los jugadores */
        }
        tr:nth-child(even) { 
            background-color: #161616; /* Color alternado para las filas pares */
        }
        tr:hover { 
            background-color: #002200; /* Efecto visual al pasar el mouse por encima */
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Acceso a la Red</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="comandante">Comandante:</label>
            <input type="text" id="comandante" required autocomplete="username">
        </div>
        <div class="input-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit">Autenticar</button>
    </form>
    <div id="mensaje"></div>
</div>

<div class="leaderboard-container">
    <h3>REGISTRO DE TONELAJE FLOTILLA</h3>
    <table id="tablaTonelaje">
        <thead>
            <tr id="headers"></tr>
        </thead>
        <tbody id="cuerpoTabla">
            <tr><td colspan="4">Cargando datos del alto mando...</td></tr>
        </tbody>
    </table>
</div>
    
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
