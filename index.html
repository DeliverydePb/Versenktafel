<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24 Flotilla - Login y Registro</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <h2>Registro de Tonelaje</h2>
        <p id="status-message">Inicia sesión con tu cuenta de Google para comenzar.</p>

        <div id="google-login-container">
            <div id="buttonDiv"></div>
        </div>

        <div id="register-form" class="hidden">
            <h3>¡Bienvenido/a!</h3>
            <p>No encontramos tu correo registrado. Por favor, elige tu nombre de capitán.</p>
            <input type="text" id="game-name" placeholder="Nombre en el Juego (ej. Capt_Miller)" required>
            <button id="btn-register">Completar Registro</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="index_scripts.js"></script>
</body>

</html>
