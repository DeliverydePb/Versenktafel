<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codificador de Radio WPC - Naval Sim</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #1a1a1a; color: #00ff00; padding: 20px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); }
        h1, h2 { text-align: center; color: #00ff00; text-transform: uppercase; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        section { margin-bottom: 30px; padding: 15px; border: 1px dotted #444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        select, input, button { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 8px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #00ff00; color: #000; }
        .result-box { background: #080808; border-left: 5px solid #00ff00; padding: 15px; margin-top: 10px; min-height: 40px; word-break: break-all; }
        label { font-size: 0.8em; display: block; margin-bottom: 5px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Protocolo de Radio WPC</h1>

    <section id="encoder">
        <h2>Codificar Mensaje</h2>
        <div class="grid">
            <div>
                <label>1. EMISOR</label>
                <select id="e-emisor">
                    <option value="B">BDU (B)</option>
                    <option value="6">U96 (6)</option>
                    <option value="2">U552 (2)</option>
                    <option value="4">U564 (4)</option>
                    <option value="7">U307 (7)</option>
                </select>
            </div>
            <div>
                <label>2. TIPO</label>
                <select id="e-tipo">
                    <option value="O">Orden (O)</option>
                    <option value="1">Pregunta (1)</option>
                    <option value="R">Respuesta (R)</option>
                    <option value="S">Solicitud (S)</option>
                </select>
            </div>
            <div>
                <label>3. RECEPTOR</label>
                <select id="e-receptor">
                    <option value="A">Todos (A)</option>
                    <option value="B">BDU (B)</option>
                    <option value="6">U96 (6)</option>
                    <option value="2">U552 (2)</option>
                    <option value="4">U564 (4)</option>
                    <option value="7">U307 (7)</option>
                </select>
            </div>
            <div>
                <label>4. OBJETO</label>
                <select id="e-objeto">
                    <option value="SU">Submarino (SU)</option>
                    <option value="CON">Convoy (CON)</option>
                    <option value="BG">Buque Guerra (BG)</option>
                    <option value="ME">Mercante (ME)</option>
                </select>
            </div>
        </div>
        <div class="grid">
            <div>
                <label>5. PARÁMETRO</label>
                <select id="e-param">
                    <option value="POS">Posición (POS)</option>
                    <option value="C">Rumbo (C)</option>
                    <option value="V">Velocidad (V)</option>
                    <option value="PSD">Sigilo (PSD)</option>
                </select>
            </div>
            <div>
                <label>Valor / Unidades</label>
                <input type="text" id="e-valor" placeholder="Ej: 82G o 15KN">
            </div>
            <div>
                <label>6. ESTADO</label>
                <select id="e-estado">
                    <option value="OK">Confirmación (OK)</option>
                    <option value="SOS">Asistencia (SOS)</option>
                    <option value="EME">Emergencia (EME)</option>
                    <option value="FIN">Fin Misión (FIN)</option>
                </select>
            </div>
        </div>
        <button onclick="codificar()">GENERAR CÓDIGO</button>
        <div class="result-box" id="res-codigo">MENSAJE CODIFICADO APARECERÁ AQUÍ</div>
    </section>

    <section id="decoder">
        <h2>Decodificar Mensaje</h2>
        <p style="font-size: 0.8em; color: #888;">Ingrese el código separado por espacios (Ej: 7 R B SU POS E)</p>
        <input type="text" id="input-decode" placeholder="B O A CON POS 82G E">
        <button onclick="decodificar()">TRADUCIR A LENGUAJE NATURAL</button>
        <div class="result-box" id="res-natural">TRADUCCIÓN APARECERÁ AQUÍ</div>
    </section>
</div>

<script>
    // Diccionarios basados en el documento WPC
    const diccionario = {
        emisores: { "B": "BDU", "6": "U96", "2": "U552", "4": "U564", "7": "U307" },
        tipos: { "O": "Orden", "1": "Pregunta", "R": "Respuesta", "S": "Solicitud" },
        receptores: { "B": "BDU", "6": "U96", "2": "U552", "4": "U564", "7": "U307", "A": "Todos los submarinos" },
        objetos: { "SU": "Submarino", "CON": "Convoy", "BG": "Buque de Guerra", "ME": "Buque Mercante", "TOI": "Tiempo de impacto" },
        params: { "POS": "Posición", "C": "Rumbo", "D": "Distancia", "V": "Velocidad", "PSD": "Permanecer sin ser detectado" },
        estados: { "OK": "Confirmación", "CNT": "Sin quejas", "NOT": "Denegado", "SOS": "Solicitud asistencia", "EME": "Emergencia", "FIN": "Retirada" },
        cierre: { "E": "Fin del mensaje" }
    };

    function codificar() {
        const msg = [
            document.getElementById('e-emisor').value,
            document.getElementById('e-tipo').value,
            document.getElementById('e-receptor').value,
            document.getElementById('e-objeto').value,
            document.getElementById('e-param').value,
            document.getElementById('e-valor').value.toUpperCase(),
            document.getElementById('e-estado').value,
            "E" // Cierre automático
        ].filter(v => v !== "").join(" ");
        
        document.getElementById('res-codigo').innerText = msg;
    }

    function decodificar() {
        const raw = document.getElementById('input-decode').value.trim().toUpperCase();
        const parts = raw.split(" ");
        let traducido = [];

        parts.forEach(p => {
            if (diccionario.emisores[p]) traducido.push(`[Emisor: ${diccionario.emisores[p]}]`);
            else if (diccionario.tipos[p]) traducido.push(`[Tipo: ${diccionario.tipos[p]}]`);
            else if (diccionario.receptores[p]) traducido.push(`[Receptor: ${diccionario.receptores[p]}]`);
            else if (diccionario.objetos[p]) traducido.push(`[Objeto: ${diccionario.objetos[p]}]`);
            else if (diccionario.params[p]) traducido.push(`[Parámetro: ${diccionario.params[p]}]`);
            else if (diccionario.estados[p]) traducido.push(`[Estado: ${diccionario.estados[p]}]`);
            else if (diccionario.cierre[p]) traducido.push(`[CIERRE]`);
            else traducido.push(`(${p})`); // Valores numéricos o grados
        });

        document.getElementById('res-natural').innerText = traducido.join(" → ");
    }
</script>

</body>
</html>
