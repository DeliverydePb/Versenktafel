<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Kriegsmarine Command - BdU</title>
    
    <!-- Cargamos tu configuración PRIMERO -->
    <script src="config.js"></script>
    
    <!-- Cargamos la librería de Google -->
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        body { font-family: 'Courier New', monospace; background: #0c0d0d; color: #adb5bd; padding: 20px; line-height: 1.4; }
        h1, h2 { color: #00ff00; border-bottom: 1px solid #00ff00; padding-bottom: 10px; text-shadow: 0 0 5px #00ff00; }
        .panel { border: 1px solid #495057; padding: 15px; margin-bottom: 15px; background: #1a1d20; box-shadow: inset 0 0 10px #000; }
        .btn { background: #1a1d20; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: #00ff00; color: #000; }
        .btn:disabled { color: #444; border-color: #444; cursor: not-allowed; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        th { background: #2b2f33; color: #00ff00; }
        th, td { padding: 12px; border: 1px solid #495057; text-align: left; }
        .oculto { display: none; }
        .alerta { color: #ff3333; font-weight: bold; margin: 10px 0; border-left: 4px solid #ff3333; padding-left: 10px; }
    </style>
</head>
<body>

    <h1>⚓ CUARTEL GENERAL DE SUBMARINOS (BdU) ⚓</h1>

    <!-- 1. IDENTIFICACIÓN -->
    <div id="login-area" class="panel">
        <h2>IDENTIFICACIÓN DE COMANDANTE</h2>
        <!-- El botón se dibujará aquí automáticamente -->
        <div id="boton-google"></div>
        <p id="user-info"></p>
    </div>

    <!-- 2. REGISTRO DE TONELAJE -->
    <div class="panel">
        <h2>📊 REGISTRO DE TONELAJE</h2>
        <table id="tabla-ranking">
            <thead>
                <tr><th>CAPITÁN</th><th>TONELAJE TOTAL</th></tr>
            </thead>
            <tbody>
                <tr><td colspan="2">Conectando con el Almirantazgo...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 3. GESTIÓN DE MISIONES -->
    <div id="misiones-area" class="panel oculto">
        <h2>🗺️ PIZARRA DE MISIONES ACTIVAS</h2>
        <div id="estado-usuario" class="alerta"></div>
        <div id="lista-misiones"></div>
        <div id="control-mision-propia" style="margin-top:20px;">
            <button id="btn-crear" class="btn" onclick="crearMision()">🚀 Iniciar Nueva Patrulla</button>
        </div>
        <div id="area-resultados" class="panel oculto" style="border-color: #00ff00; margin-top: 20px;">
            <h3>📥 FINALIZAR PATRULLA</h3>
            <p>Sube la captura de pantalla con los resultados finales:</p>
            <input type="file" id="foto-ocr" accept="image/*">
            <br><br>
            <button class="btn" onclick="alert('Sistema de OCR en desarrollo.')">ENVIAR REPORTE AL BdU</button>
        </div>
    </div>

    <script>
        let usuarioActual = null;
        let misionesActivas = [];

        // Esta función inicializa el botón de Google usando los datos de config.js
        function inicializarGoogle() {
            if (typeof CONFIG === 'undefined' || !CONFIG.CLIENT_ID) {
                console.error("Error: No se encontró CONFIG.CLIENT_ID en config.js");
                return;
            }

            google.accounts.id.initialize({
                client_id: CONFIG.CLIENT_ID,
                callback: onSignIn
            });

            google.accounts.id.renderButton(
                document.getElementById("boton-google"),
                { theme: "outline", size: "large" }
            );
        }

        async function refrescarDatos() {
            try {
                const r = await fetch(CONFIG.URL_API);
                const data = await r.json();
                const cuerpoTabla = document.querySelector("#tabla-ranking tbody");
                cuerpoTabla.innerHTML = data.ranking.map(u => `<tr><td>${u.n}</td><td>${u.p.toLocaleString()} TN</td></tr>`).join('') || "<tr><td colspan='2'>Sin registros.</td></tr>";
                misionesActivas = data.misiones;
                actualizarInterfazMisiones();
            } catch (e) { console.error("Error en refrescarDatos:", e); }
        }

        function onSignIn(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            usuarioActual = payload;
            document.getElementById('user-info').innerText = "Comandante: " + payload.name;
            document.getElementById('misiones-area').classList.remove('oculto');
            document.getElementById('login-area').style.display = "none";
            fetch(CONFIG.URL_API, { method: 'POST', body: JSON.stringify({action:"login", email:payload.email, nombre:payload.name}) });
            refrescarDatos();
        }

        function actualizarInterfazMisiones() {
            if (!usuarioActual) return;
            const lista = document.getElementById('lista-misiones');
            const miMision = misionesActivas.find(m => m.creadorEmail === usuarioActual.email);
            const btnCrear = document.getElementById('btn-crear');
            const areaRes = document.getElementById('area-resultados');
            const estadoMsg = document.getElementById('estado-usuario');

            if (miMision) {
                btnCrear.style.display = "none";
                areaRes.classList.remove('oculto');
                estadoMsg.innerText = "⚠️ TIENES UNA PATRULLA ACTIVA.";
                lista.innerHTML = "";
            } else {
                btnCrear.style.display = "block";
                areaRes.classList.add('oculto');
                estadoMsg.innerText = "PATRULLAS DISPONIBLES:";
                lista.innerHTML = misionesActivas.map(m => `
                    <div style="border:1px solid #444; padding:15px; margin:10px 0; background:#252a2e;">
                        <strong>Misión de:</strong> ${m.creadorNombre} <br>
                        <button class="btn" onclick="unirse('${m.id}')">⚓ UNIRSE</button>
                    </div>
                `).join('') || "<p>No hay patrullas activas.</p>";
            }
        }

        async function crearMision() {
            await fetch(CONFIG.URL_API, { method: 'POST', body: JSON.stringify({action: "crearMision", email: usuarioActual.email, nombreCreador: usuarioActual.name })});
            refrescarDatos();
        }

        async function unirse(id) {
            const sub = prompt("¿Submarino?");
            if(!sub) return;
            await fetch(CONFIG.URL_API, { method: 'POST', body: JSON.stringify({action: "unirseMision", idMision: id, email: usuarioActual.email, submarino: sub })});
            refrescarDatos();
        }

        // Ejecutar todo cuando la ventana cargue
        window.onload = function() {
            inicializarGoogle();
            refrescarDatos();
        };
    </script>
</body>
</html>
