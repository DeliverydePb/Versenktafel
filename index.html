<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Tonelaje - Flota Multijugador</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="app">
        <h1>Control de Tonelaje Hundido</h1>
        
        <!-- Contenedor de Login -->
        <div id="login-section">
            <p>Inicia sesión para registrar tus hundimientos:</p>
            <div id="buttonDiv"></div>
        </div>

        <!-- Panel de Usuario (Oculto al inicio) -->
        <div id="user-panel" style="display: none;">
            <h2 id="welcome-msg"></h2>
            <button onclick="handleLogout()">Cerrar Sesión</button>
            <hr>
            <p>Estado: Conectado a la base de datos de la Flota.</p>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            // Decodificamos el JWT para obtener info del usuario
            const responsePayload = parseJwt(response.credential);
            
            console.log("ID: " + responsePayload.sub);
            console.log('Nombre: ' + responsePayload.name);
            
            document.getElementById("login-section").style.display = "none";
            document.getElementById("user-panel").style.display = "block";
            document.getElementById("welcome-msg").innerText = "Bienvenido, Capitán " + responsePayload.name;

            // Aquí guardaremos en LocalStorage para persistencia local
            localStorage.setItem("user_token", response.credential);
        }

        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "TU_CLIENT_ID_AQUI.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "outline", size: "large" }
            );
        };

        function handleLogout() {
            localStorage.removeItem("user_token");
            location.reload();
        }
    </script>
</body>
</html>
