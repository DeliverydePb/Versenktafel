<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BdU - Versenktafel</title>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0d0d; color: #adb5bd; padding: 20px; }
        .panel { border: 1px solid #444; padding: 15px; background: #1a1d20; margin-bottom: 20px; box-shadow: inset 0 0 10px #000; }
        h1, h2 { color: #00ff00; border-bottom: 1px solid #00ff00; text-shadow: 0 0 5px #00ff00; }
        input { background: #000; color: #00ff00; border: 1px solid #444; padding: 8px; margin: 5px 0; width: 250px; display: block; }
        .btn { background: #1a1d20; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: #00ff00; color: #000; }
        .oculto { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #2b2f33; color: #00ff00; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        .link { color: #00ff00; text-decoration: underline; cursor: pointer; font-size: 0.8em; }
        
        /* Estilo específico para el ranking global */
        #global-ranking { border-top: 2px solid #00ff00; margin-top: 50px; }
    </style>
</head>
<body>

    <h1>⚓ BdU - VERSENKTAFEL ⚓</h1>

    <!-- 1. AREA DE AUTENTICACIÓN (LOGIN/REGISTRO) -->
    <div id="auth-area" class="panel">
        <div id="login-form">
            <h2>ACCESO COMANDANTE</h2>
            <input type="email" id="l-email" placeholder="Correo Electrónico">
            <input type="password" id="l-pass" placeholder="Clave de Acceso">
            <button class="btn" onclick="login()">Entrar</button>
            <p>¿No registrado? <span class="link" onclick="toggleAuth(false)">Crear Cuenta</span> | <span class="link" onclick="recuperar()">Olvidé mi clave</span></p>
        </div>

        <div id="registro-form" class="oculto">
            <h2>NUEVO RECLUTA</h2>
            <input type="text" id="r-nombre" placeholder="Nombre de Comandante (ej: U-96)">
            <input type="email" id="r-email" placeholder="Correo Electrónico">
            <input type="password" id="r-pass" placeholder="Clave de Acceso">
            <button class="btn" onclick="registrar()">Registrarse</button>
            <p><span class="link" onclick="toggleAuth(true)">Volver al Login</span></p>
        </div>
    </div>

    <!-- 2. AREA PRIVADA (SOLO TRAS LOGIN) -->
    <div id="main-area" class="oculto">
        <div class="panel">
            <h2 id="bienvenida"></h2>
            <div id="lista-misiones" style="margin-bottom: 15px;"></div>
            <button class="btn" onclick="crearMision()">🚀 Iniciar Nueva Patrulla</button>
            <button class="btn" style="border-color:red; color:red; margin-left: 10px;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </div>

    <!-- 3. RANKING SIEMPRE VISIBLE (ABAJO) -->
    <div id="global-ranking" class="panel">
        <h2>📊 REGISTRO GLOBAL DE TONELAJE (RANKING)</h2>
        <table id="tabla-ranking">
            <thead>
                <tr>
                    <th>CAPITÁN</th>
                    <th>TONELAJE TOTAL</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="2">Cargando datos del Almirantazgo...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let usuario = null;

        function toggleAuth(showLogin) {
            document.getElementById('login-form').classList.toggle('oculto', !showLogin);
            document.getElementById('registro-form').classList.toggle('oculto', showLogin);
        }

        // Función base para hablar con el servidor
        async function api(params) {
            try {
                const resp = await fetch(CONFIG.URL_API, {
                    method: 'POST',
                    body: JSON.stringify(params)
                });
                return await resp.json();
            } catch (e) {
                console.error("Error de conexión:", e);
                return { status: "error", msg: "No se pudo conectar con el servidor." };
            }
        }

        async function registrar() {
            const nombre = document.getElementById('r-nombre').value;
            const email = document.getElementById('r-email').value;
            const pass = document.getElementById('r-pass').value;
            if(!nombre || !email || !pass) return alert("Complete todos los campos");

            const res = await api({action: "registro", nombre, email, pass});
            alert(res.msg);
            if(res.status === "ok") toggleAuth(true);
        }

        async function login() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            const res = await api({action: "login", email, pass});

            if(res.status === "ok") {
                usuario = res;
                document.getElementById('auth-area').classList.add('oculto');
                document.getElementById('main-area').classList.remove('oculto');
                document.getElementById('bienvenida').innerText = "BIENVENIDO, HERR KALEUN " + res.nombre;
                refrescar();
            } else {
                alert(res.msg);
            }
        }

        async function recuperar() {
            const email = prompt("Ingrese su correo para recibir la clave:");
            if(!email) return;
            const res = await api({action: "recuperar", email});
            alert(res.msg);
        }

        async function refrescar() {
            // Obtenemos datos sin acción específica para traer ranking y misiones
            const data = await api({action: "get"});
            
            if (data.ranking) {
                document.querySelector("#tabla-ranking tbody").innerHTML = data.ranking.map(u => 
                    `<tr><td>${u.n}</td><td>${u.p.toLocaleString()} TN</td></tr>`
                ).join('') || "<tr><td colspan='2'>Sin registros aún.</td></tr>";
            }

            if (data.misiones) {
                document.getElementById('lista-misiones').innerHTML = data.misiones.map(m => 
                    `<div class="panel" style="border-color: #333;">Misión activa de: <strong>${m.n}</strong></div>`
                ).join('') || "<p>No hay patrullas en curso actualmente.</p>";
            }
        }

        async function crearMision() {
            const res = await api({action: "crearMision", email: usuario.email, nombre: usuario.nombre});
            if(res.status === "ok") {
                alert("Patrulla iniciada. ¡Buena caza!");
                refrescar();
            }
        }

        // Al cargar la página, llenamos el ranking público inmediatamente
        window.onload = () => {
            refrescar();
        };
    </script>
</body>
</html>
