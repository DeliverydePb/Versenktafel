<!DOCTYPE html>
<!--
  index.html — Página de Login (Acceso al sistema)
  
  Esta es la primera página que ve el usuario cuando visita el sitio.
  Si ya tiene una sesión activa, lo redirige automáticamente al dashboard.
  
  Estructura de archivos que necesita esta página:
    css/style.css   → Los estilos visuales
    js/config.js    → La URL del servidor
    js/utils.js     → Funciones compartidas
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport: hace que la página se vea bien en celulares -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Hunters League — Acceso</title>
  
  <!-- Favicon: el ícono que aparece en la pestaña del navegador -->
  <!-- Por ahora usamos un emoji; después podés agregar un .ico real -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
  
  <!-- Nuestros estilos -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Encabezado del sitio ─────────────────────────────── -->
  <header class="site-header">
    
    <!-- Ícono circular con animación de sonar -->
    <div class="logo-badge" role="img" aria-label="Logo">⚓</div>
    
    <h1 class="site-title">Silent Hunters</h1>
    <p class="site-subtitle">Kriegsmarine Operations League</p>
    
  </header>

  <!-- ── Panel principal: el formulario de login ──────────── -->
  <main>
    <div class="panel">
      
      <h2 class="panel-titulo">Acceso al Sistema</h2>
      <hr class="panel-separador">
      
      <!-- Alerta: se muestra si hay errores o mensajes.
           Por defecto está oculta (display:none en CSS).
           El JS la hace visible cuando es necesario. -->
      <div id="alerta" class="alerta" role="alert" aria-live="polite"></div>
      
      <!-- El formulario de login.
           onsubmit="return false" evita que la página se recargue
           al hacer clic en Enviar; el JS maneja todo. -->
      <form id="form-login" onsubmit="return false" novalidate>
        
        <!-- Campo: Dirección de email -->
        <div class="form-grupo">
          <label for="email">📡 Dirección de Transmisión (E-mail)</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="comandante@flota.com"
            autocomplete="email"
            required
          >
          <!-- Mensaje de error específico para este campo -->
          <span id="email-error" class="campo-error" role="alert"></span>
        </div>
        
        <!-- Campo: Contraseña -->
        <div class="form-grupo">
          <label for="contrasena">🔐 Código de Acceso</label>
          <input
            type="password"
            id="contrasena"
            name="contrasena"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <span id="contrasena-error" class="campo-error" role="alert"></span>
        </div>
        
        <!-- Botón de envío -->
        <button type="submit" class="btn-primario" id="btn-login">
          ▶ Conectar
        </button>
        
      </form>
      
      <!-- Links de navegación entre páginas -->
      <nav class="nav-links" aria-label="Navegación auxiliar">
        <a href="recovery.html">¿Olvidaste tu código de acceso?</a>
        <br>
        <a href="register.html">Nuevo Comandante → Registrarse</a>
      </nav>
      
      <!-- Decoración: muestra "profundidad" como en un submarino -->
      <div class="profundidad" aria-hidden="true">PROFUNDIDAD: 150m — RUMBO: 270°</div>
      
    </div>
  </main>
  
  <!-- ── Pie de página ─────────────────────────────────────── -->
  <footer class="site-footer" aria-label="Pie de página">
    SILENT HUNTERS LEAGUE · EST. 2024 · OPERACIONES SUBSUPERFICIALES
  </footer>

  <!-- ── Scripts ───────────────────────────────────────────── -->
  <!-- Los scripts van al final del body para que el HTML cargue primero -->
  
  <!-- 1. Primero la configuración (define CONFIG) -->
  <script src="js/config.js"></script>
  
  <!-- 2. Luego las utilidades (usa CONFIG, define funciones) -->
  <script src="js/utils.js"></script>
  
  <!-- 3. La lógica específica de esta página -->
  <script>
    /* ── Verificar si ya hay una sesión activa ────────────────
       Cuando la página carga, revisamos si el usuario ya
       se había logueado antes. Si es así, lo mandamos directo
       al dashboard sin pasar por el login.
       ─────────────────────────────────────────────────────── */
    (function verificarSesionExistente() {
      const sesion = obtenerSesion();
      if (sesion) {
        // Ya está logueado, lo redirigimos al dashboard
        window.location.href = 'dashboard.html';
      }
    })(); // Los paréntesis del final hacen que se ejecute inmediatamente


    /* ── Lógica del formulario de login ──────────────────────
       Esperamos a que todo el HTML esté cargado antes de 
       agregar los "event listeners" (escuchadores de eventos).
       ─────────────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', function() {
      
      // Obtenemos referencias a los elementos del DOM (la página)
      const form         = document.getElementById('form-login');
      const btnLogin     = document.getElementById('btn-login');
      const inputEmail   = document.getElementById('email');
      const inputClave   = document.getElementById('contrasena');
      
      /* Cuando el usuario envía el formulario ─────────────── */
      form.addEventListener('submit', async function() {
        
        // ── Paso 1: Limpiar errores anteriores ──────────────
        ocultarAlerta('alerta');
        limpiarErroresCampos();
        
        // ── Paso 2: Leer los valores ingresados ─────────────
        const email     = inputEmail.value.trim();     // .trim() elimina espacios extra
        const contrasena = inputClave.value;
        
        // ── Paso 3: Validar los campos ──────────────────────
        let hayErrores = false;
        
        if (!email) {
          mostrarErrorCampo('email', 'email-error', 'Ingresá tu dirección de e-mail.');
          hayErrores = true;
        } else if (!validarEmail(email)) {
          mostrarErrorCampo('email', 'email-error', 'El formato del e-mail no es válido.');
          hayErrores = true;
        }
        
        if (!contrasena) {
          mostrarErrorCampo('contrasena', 'contrasena-error', 'Ingresá tu código de acceso.');
          hayErrores = true;
        }
        
        // Si hay errores, no continuamos
        if (hayErrores) return;
        
        // ── Paso 4: Deshabilitar el botón para evitar doble envío
        btnLogin.disabled = true;
        btnLogin.classList.add('cargando');
        btnLogin.textContent = '▶ Verificando';
        
        // ── Paso 5: Hashear la contraseña antes de enviarla ─
        // NUNCA enviamos la contraseña en texto plano
        const claveHash = await hashearContrasena(contrasena);
        
        // ── Paso 6: Enviar los datos al servidor ────────────
        const resultado = await pedirAlServidor('login', {
          email:    email,
          claveHash: claveHash,
        });
        
        // ── Paso 7: Procesar la respuesta del servidor ──────
        if (resultado.exito) {
          
          // Login exitoso: guardamos la sesión en el navegador
          guardarSesion({
            comandante: resultado.comandante,
            email:      resultado.email,
          });
          
          // Mostramos mensaje y redirigimos al dashboard
          mostrarAlerta('alerta', '✓ Conexión establecida. Redirigiendo...', 'exito');
          
          // Esperamos un segundo para que el usuario vea el mensaje
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
          
        } else {
          
          // Login fallido: mostramos el error
          mostrarAlerta('alerta', resultado.mensaje || 'Credenciales incorrectas.', 'error');
          
          // Rehabilitamos el botón para que pueda intentar de nuevo
          btnLogin.disabled = false;
          btnLogin.classList.remove('cargando');
          btnLogin.textContent = '▶ Conectar';
        }
      });
      
      
      /* ── Función auxiliar: mostrar error en un campo ─────── */
      function mostrarErrorCampo(idCampo, idError, mensaje) {
        const campo = document.getElementById(idCampo);
        const error = document.getElementById(idError);
        if (campo) campo.classList.add('invalido');
        if (error) {
          error.textContent = mensaje;
          error.style.display = 'block';
        }
      }
      
      /* ── Función auxiliar: limpiar todos los errores ─────── */
      function limpiarErroresCampos() {
        // Quitamos la clase 'invalido' de todos los campos
        document.querySelectorAll('input.invalido').forEach(i => i.classList.remove('invalido'));
        // Ocultamos todos los mensajes de error
        document.querySelectorAll('.campo-error').forEach(e => {
          e.style.display = 'none';
          e.textContent = '';
        });
      }
      
      /* ── Limpiar error cuando el usuario empieza a escribir ─
         Mejora la experiencia: el error desaparece apenas el 
         usuario intenta corregirlo.
         ─────────────────────────────────────────────────────── */
      [inputEmail, inputClave].forEach(input => {
        input.addEventListener('input', function() {
          this.classList.remove('invalido');
          // Ocultamos el error del campo hermano (.campo-error siguiente al input)
          const errorSpan = this.parentElement.querySelector('.campo-error');
          if (errorSpan) errorSpan.style.display = 'none';
        });
      });
      
    }); // Fin de DOMContentLoaded
    
  </script>
  
</body>
</html>
