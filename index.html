<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BdU - Versenktafel</title>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0d0d; color: #adb5bd; padding: 20px; padding-top: 60px; }
        .panel { border: 1px solid #444; padding: 15px; background: #1a1d20; margin-bottom: 20px; box-shadow: inset 0 0 10px #000; }
        h1, h2 { color: #00ff00; border-bottom: 1px solid #00ff00; text-shadow: 0 0 5px #00ff00; }
        input, select { background: #000; color: #00ff00; border: 1px solid #444; padding: 8px; margin: 5px 0; width: 250px; display: block; }
        .btn { background: #1a1d20; color: #00ff00; border: 1px solid #00ff00; padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn:hover { background: #00ff00; color: #000; }
        .oculto { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #2b2f33; color: #00ff00; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        .link { color: #00ff00; text-decoration: underline; cursor: pointer; font-size: 0.8em; }
        
        #user-header { position: absolute; top: 10px; right: 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,255,0,0.1); padding: 5px 15px; border: 1px solid #00ff0044; }
        
        /* ESTILOS DE MISIONES */
        .mision-card { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #444; padding: 10px 0; gap: 10px; }
        .mision-activa { border: 1px solid #00ff00; background: rgba(0, 255, 0, 0.05); padding: 10px; border-radius: 4px; }
        .badge-unido { background: #00ff00; color: #000; padding: 2px 6px; font-size: 0.7em; font-weight: bold; border-radius: 3px; margin-left: 10px; }
        
        .mision-controls { display: flex; align-items: center; gap: 5px; }
        .mision-controls select { width: 160px; margin: 0; padding: 4px; font-size: 0.8em; }
        
        .alerta-mision { color: #ff9900; font-weight: bold; border: 1px solid #ff9900; padding: 15px; margin-top: 10px; text-align: center; }
        .btn-danger { border-color: #ff4444; color: #ff4444; margin-top: 10px; }
        .btn-danger:hover { background: #ff4444; color: #000; }
    </style>
</head>
<body>

    <div id="user-header" class="oculto">
        <span>KALEUN: <strong id="header-nombre" style="color: #00ff00;"></strong></span>
        <button class="btn" style="border-color:red; color:red; padding: 5px 10px; font-size: 0.8em;" onclick="location.reload()">Cerrar Sesión</button>
    </div>

    <h1>⚓ BdU - VERSENKTAFEL ⚓</h1>

    <div id="auth-area" class="panel">
        <div id="login-form">
            <h2>ACCESO COMANDANTE</h2>
            <input type="email" id="l-email" placeholder="Correo Electrónico">
            <input type="password" id="l-pass" placeholder="Clave de Acceso">
            <button class="btn" onclick="login()">Entrar</button>
            <p>¿No registrado? <span class="link" onclick="toggleAuth(false)">Crear Cuenta</span></p>
        </div>
        <div id="registro-form" class="oculto">
            <h2>NUEVO RECLUTA</h2>
            <input type="text" id="r-nombre" placeholder="Nombre de Comandante">
            <input type="email" id="r-email" placeholder="Correo Electrónico">
            <input type="password" id="r-pass" placeholder="Clave de Acceso">
            <button class="btn" onclick="registrar()">Registrarse</button>
            <p><span class="link" onclick="toggleAuth(true)">Volver al Login</span></p>
        </div>
    </div>

    <div id="main-area" class="oculto">
        <div class="panel">
            <h2>CENTRO DE OPERACIONES</h2>
            <h3>Patrullas en Curso</h3>
            <div id="lista-misiones" style="margin-bottom: 15px;"></div>
            <hr>
            <div id="seccion-nueva-patrulla">
                <h3>Nueva Patrulla</h3>
                <label for="tipo-sub">Seleccione su Sumergible:</label>
                <select id="tipo-sub">
                    <option value="">-- Seleccione Submarino --</option>
                    <option value="U-96">U-96</option>
                    <option value="U-552">U-552</option>
                    <option value="U-564">U-564</option>
                    <option value="U-307">U-307</option>
                </select>
                <button class="btn" onclick="crearMision()">🚀 Iniciar Nueva Patrulla</button>
            </div>
            <div id="mensaje-bloqueo-patrulla" class="oculto">
                <div class="alerta-mision">
                    <p id="texto-alerta">⚠️ TIENE UNA PATRULLA EN CURSO.</p>
                    <div style="display: flex; justify-content: center; gap: 20px;">
                        <button class="btn" onclick="entregarResultados()">📥 Entregar Resultados</button>
                        <button class="btn btn-danger" onclick="cancelarMision()">❌ Cancelar Patrulla</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="global-ranking" class="panel">
        <h2>📊 REGISTRO GLOBAL DE TONELAJE</h2>
        <table id="tabla-ranking">
            <thead>
                <tr><th>CAPITÁN</th><th>TONELAJE</th></tr>
            </thead>
            <tbody>
                <tr><td colspan="2">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let usuario = null;

        function toggleAuth(showLogin) {
            document.getElementById('login-form').classList.toggle('oculto', !showLogin);
            document.getElementById('registro-form').classList.toggle('oculto', showLogin);
        }

        async function api(params) {
            try {
                const resp = await fetch(CONFIG.URL_API, {
                    method: 'POST',
                    body: JSON.stringify(params)
                });
                return await resp.json();
            } catch (e) {
                return { status: "error", msg: "Error de red o CORS." };
            }
        }

        async function login() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            const res = await api({action: "login", email, pass});
            if(res.status === "ok") {
                usuario = res;
                document.getElementById('auth-area').classList.add('oculto');
                document.getElementById('main-area').classList.remove('oculto');
                document.getElementById('user-header').classList.remove('oculto');
                document.getElementById('header-nombre').innerText = res.nombre;
                refrescar();
            } else { alert(res.msg); }
        }

        async function refrescar() {
            const data = await api({action: "get"});
            
            if (data.ranking) {
                document.querySelector("#tabla-ranking tbody").innerHTML = data.ranking.map(u => 
                    `<tr><td>${u.n}</td><td>${u.p.toLocaleString()} TN</td></tr>`
                ).join('') || "<tr><td colspan='2'>Sin registros.</td></tr>";
            }

            if (data.misiones) {
                // Buscamos si soy el creador O si estoy en la lista de participantes
                const soyCreador = data.misiones.find(m => m.e === usuario?.email);
                const soyParticipante = data.misiones.find(m => m.p && JSON.parse(m.p).some(p => p.email === usuario?.email));
                
                const enMision = soyCreador || soyParticipante;

                if(usuario) {
                    document.getElementById('seccion-nueva-patrulla').classList.toggle('oculto', !!enMision);
                    document.getElementById('mensaje-bloqueo-patrulla').classList.toggle('oculto', !enMision);
                    
                    // Cambiar texto si soy invitado
                    if(soyParticipante) {
                        document.getElementById('texto-alerta').innerText = "⚓ UNIDO A LA MANADA DE LOBOS.";
                    } else {
                        document.getElementById('texto-alerta').innerText = "⚠️ TIENE UNA PATRULLA EN CURSO.";
                    }
                }

                document.getElementById('lista-misiones').innerHTML = data.misiones.map(m => {
                    const participantes = m.p ? JSON.parse(m.p) : [];
                    const esMiPropiaMision = (usuario && m.e === usuario.email);
                    const yaEstoyUnido = participantes.some(p => p.email === usuario?.email);

                    return `<div class="mision-card ${(esMiPropiaMision || yaEstoyUnido) ? 'mision-activa' : ''}">
                        <span>
                            Patrulla de: <strong>${m.n}</strong> 
                            ${yaEstoyUnido ? '<span class="badge-unido">ESTÁS AQUÍ</span>' : ''}
                            ${esMiPropiaMision ? '<span class="badge-unido" style="background:#ff9900">LÍDER</span>' : ''}
                        </span>
                        ${(!enMision && usuario) ? `
                            <div class="mision-controls">
                                <select id="sub-join-${m.id}">
                                    <option value="">-- Sumergible --</option>
                                    <option value="U-96">U-96</option>
                                    <option value="U-552">U-552</option>
                                    <option value="U-564">U-564</option>
                                    <option value="U-307">U-307</option>
                                </select>
                                <button class="btn" style="padding: 5px 10px; font-size: 0.7em;" onclick="unirseMision('${m.id}')">Unirse</button>
                            </div>
                        ` : ''}
                    </div>`;
                }).join('') || "<p>No hay patrullas en curso.</p>";
            }
        }

        async function crearMision() {
            const sub = document.getElementById('tipo-sub').value;
            if(!sub) return alert("Seleccione un submarino.");
            const res = await api({action: "crearMision", email: usuario.email, nombre: usuario.nombre, submarino: sub});
            if(res.status === "ok") { refrescar(); } else { alert(res.msg); }
        }

        async function unirseMision(misionId) {
            const sub = document.getElementById(`sub-join-${misionId}`).value;
            if(!sub) return alert("Seleccione un submarino.");
            const res = await api({
                action: "unirseMision",
                idMision: misionId,
                email: usuario.email,
                nombre: usuario.nombre,
                submarino: sub
            });
            if(res.status === "ok") { refrescar(); } else { alert(res.msg); }
        }

        async function cancelarMision() {
            if(!confirm("¿Está seguro de que desea abortar la patrulla?")) return;
            const res = await api({ action: "cancelarMision", email: usuario.email });
            if(res.status === "ok") { refrescar(); } else { alert(res.msg); }
        }

        async function entregarResultados() { alert("Bitácora lista para enviar."); }
        window.onload = () => { refrescar(); };
    </script>
</body>
</html>
