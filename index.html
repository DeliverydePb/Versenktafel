<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>U-Boot Flotilla - Login & Clasificación</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/config.js"></script>
    <script src="js/scripts.js" defer></script>
</head>
<body>
    <header>
        <h1>Registro de Comandantes - 1939</h1>
    </header>

    <main>
        <section id="auth-section">
            <div id="login-container">
                <h3>Ingreso para Comandantes Registrados</h3>
                <div id="buttonDiv"></div> </div>
            
            <div id="register-container" style="display:none;">
                <h3>Registrar Nuevo Comandante</h3>
                <input type="text" id="reg-username" placeholder="Nombre de usuario en el juego">
                <button id="btn-registrar">Registrar e Iniciar Sesión</button>
            </div>
        </section>

        <hr>

        <section id="leaderboard-section">
            <h2>Tabla de Tonelaje de la Flotilla</h2>
            <table id="tabla-tonelaje">
                <thead>
                    <tr>
                        <th onclick="ordenarTabla(0)">Comandante ↕</th>
                        <th onclick="ordenarTabla(1)">Patrullas Actuales ↕</th>
                        <th onclick="ordenarTabla(2)">Tonelaje Carrera ↕</th>
                        <th onclick="ordenarTabla(3)">Índice Tons/Patrulla ↕</th>
                        <th onclick="ordenarTabla(4)">Mayor Tonelaje Carrera ↕</th>
                        <th onclick="ordenarTabla(5)">Máx Patrullas Carrera ↕</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    </tbody>
            </table>
        </section>
    </main>
</body>
</html>
