<!DOCTYPE html>
<!--
  reset.html — Página para establecer una nueva contraseña
  
  El usuario llega a esta página desde el link del email de recuperación.
  La URL tiene un parámetro token: reset.html?token=abc123xyz
  
  El proceso:
  1. Leemos el token de la URL
  2. Lo validamos con el servidor (para saber que no expiró)
  3. Si es válido, mostramos el formulario para nueva contraseña
  4. Enviamos la nueva contraseña hasheada al servidor
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Hunters League — Nueva Clave</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="logo-badge" role="img" aria-label="Logo">⚓</div>
    <h1 class="site-title">Silent Hunters</h1>
    <p class="site-subtitle">Kriegsmarine Operations League</p>
  </header>

  <main>
    <div class="panel">
      
      <h2 class="panel-titulo">Nuevo Código de Acceso</h2>
      <hr class="panel-separador">
      
      <!-- Alerta de mensajes -->
      <div id="alerta" class="alerta" role="alert" aria-live="polite"></div>
      
      <!-- El formulario. Empieza oculto hasta validar el token.
           Si el token no es válido, nunca se muestra. -->
      <form id="form-reset" onsubmit="return false" novalidate style="display:none;">
        
        <div class="form-grupo">
          <label for="contrasena">🔐 Nuevo Código de Acceso</label>
          <input
            type="password"
            id="contrasena"
            name="contrasena"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
            required
          >
          <span id="contrasena-error" class="campo-error" role="alert"></span>
        </div>
        
        <div class="form-grupo">
          <label for="confirmar">🔐 Confirmar Nuevo Código</label>
          <input
            type="password"
            id="confirmar"
            name="confirmar"
            placeholder="Repetí la contraseña"
            autocomplete="new-password"
            required
          >
          <span id="confirmar-error" class="campo-error" role="alert"></span>
        </div>
        
        <button type="submit" class="btn-primario" id="btn-reset">
          ▶ Establecer Nueva Clave
        </button>
        
      </form>
      
      <nav class="nav-links">
        <a href="index.html">← Volver al Acceso</a>
      </nav>
      
    </div>
  </main>
  
  <footer class="site-footer">
    SILENT HUNTERS LEAGUE · EST. 2024 · OPERACIONES SUBSUPERFICIALES
  </footer>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      
      const formReset   = document.getElementById('form-reset');
      const btnReset    = document.getElementById('btn-reset');
      const inputClave  = document.getElementById('contrasena');
      const inputConf   = document.getElementById('confirmar');
      
      // ── Paso 1: Leer el token de la URL ───────────────────
      // Si alguien entra a esta página sin token, le mostramos error
      const token = leerParametroURL('token');
      
      if (!token) {
        mostrarAlerta(
          'alerta',
          'Link inválido. Por favor solicitá un nuevo link de recuperación.',
          'error'
        );
        return; // Salimos; no mostramos el formulario
      }
      
      // ── Paso 2: Validar el token con el servidor ──────────
      // Le preguntamos al servidor si ese token existe y no expiró
      mostrarAlerta('alerta', 'Verificando enlace...', 'info');
      
      const validacion = await pedirAlServidor('validarToken', { token });
      
      if (!validacion.exito) {
        // El token no es válido o expiró
        mostrarAlerta(
          'alerta',
          validacion.mensaje || 'El link expiró o no es válido. Solicitá uno nuevo.',
          'error'
        );
        return; // No mostramos el formulario
      }
      
      // ── Paso 3: Token válido, mostramos el formulario ─────
      ocultarAlerta('alerta');
      formReset.style.display = 'block'; // Hacemos visible el formulario
      
      
      // ── Paso 4: Manejar el envío del formulario ───────────
      formReset.addEventListener('submit', async function() {
        
        ocultarAlerta('alerta');
        // Limpiar errores
        document.querySelectorAll('input.invalido').forEach(i => i.classList.remove('invalido'));
        document.querySelectorAll('.campo-error').forEach(e => { e.style.display = 'none'; });
        
        const clave     = inputClave.value;
        const confirmar = inputConf.value;
        
        let hayErrores = false;
        
        // Validar nueva contraseña
        const validacionClave = validarContrasena(clave);
        if (!validacionClave.valida) {
          inputClave.classList.add('invalido');
          const err = document.getElementById('contrasena-error');
          err.textContent = validacionClave.mensaje;
          err.style.display = 'block';
          hayErrores = true;
        }
        
        // Validar que coincidan
        if (clave !== confirmar) {
          inputConf.classList.add('invalido');
          const err = document.getElementById('confirmar-error');
          err.textContent = 'Los códigos no coinciden.';
          err.style.display = 'block';
          hayErrores = true;
        }
        
        if (hayErrores) return;
        
        btnReset.disabled = true;
        btnReset.textContent = '▶ Guardando';
        
        // Hashear la nueva contraseña
        const claveHash = await hashearContrasena(clave);
        
        // Enviar al servidor: el token + el nuevo hash
        // El servidor busca el usuario por el token y actualiza su clave
        const resultado = await pedirAlServidor('resetearClave', {
          token,
          claveHash,
        });
        
        if (resultado.exito) {
          
          // Ocultamos el formulario y mostramos mensaje de éxito
          formReset.style.display = 'none';
          mostrarAlerta(
            'alerta',
            '✓ Código actualizado. Podés ingresar con tu nueva clave.',
            'exito'
          );
          
          // Redirigimos al login después de 2 segundos
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
          
        } else {
          mostrarAlerta('alerta', resultado.mensaje || 'Error al actualizar. Intentá de nuevo.', 'error');
          btnReset.disabled = false;
          btnReset.textContent = '▶ Establecer Nueva Clave';
        }
      });
      
    }); // Fin DOMContentLoaded
  </script>

</body>
</html>
